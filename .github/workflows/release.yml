name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────
  # macOS ARM64 (Apple Silicon)
  # ─────────────────────────────────────────
  build-macos-arm64:
    name: Build macOS (Apple Silicon)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        run: wails build -platform darwin/arm64 -clean

      - name: Package .app → zip
        run: |
          cd build/bin
          zip -r LiteRedis-macos-arm64.zip LiteRedis.app

      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: build/bin/LiteRedis-macos-arm64.zip

  # ─────────────────────────────────────────
  # macOS x64 (Intel)
  # ─────────────────────────────────────────
  build-macos-amd64:
    name: Build macOS (Intel)
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        run: wails build -platform darwin/amd64 -clean

      - name: Package .app → zip
        run: |
          cd build/bin
          zip -r LiteRedis-macos-amd64.zip LiteRedis.app

      - uses: actions/upload-artifact@v4
        with:
          name: macos-amd64
          path: build/bin/LiteRedis-macos-amd64.zip

  # ─────────────────────────────────────────
  # Windows x64
  # ─────────────────────────────────────────
  build-windows:
    name: Build Windows (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        run: wails build -platform windows/amd64 -nsis -clean

      - uses: actions/upload-artifact@v4
        with:
          name: windows-amd64
          path: |
            build/bin/LiteRedis.exe
            build/bin/LiteRedis-amd64-installer.exe

  # ─────────────────────────────────────────
  # 汇总发布 GitHub Release
  # ─────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-macos-arm64, build-macos-amd64, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "LiteRedis ${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            artifacts/macos-arm64/LiteRedis-macos-arm64.zip
            artifacts/macos-amd64/LiteRedis-macos-amd64.zip
            artifacts/windows-amd64/LiteRedis.exe
            artifacts/windows-amd64/LiteRedis-amd64-installer.exe
